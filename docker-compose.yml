services:

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-intrastat}
      POSTGRES_USER: ${POSTGRES_USER:-intrastat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-intrastat} -d ${POSTGRES_DB:-intrastat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-intrastat}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-intrastat}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
