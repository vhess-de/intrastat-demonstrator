# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/intrastat}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:intrastat}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:intrastat}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.ford.intrastat=INFO
logging.level.org.flywaydb=INFO
